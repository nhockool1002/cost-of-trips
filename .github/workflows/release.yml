name: Build and attach release APK + AAB

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK and AAB
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Collect artifacts with release tag
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk "artifacts/cost-of-trips-${{ github.event.release.tag_name }}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "artifacts/cost-of-trips-${{ github.event.release.tag_name }}.aab"

      - name: Upload APK + AAB to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            artifacts/cost-of-trips-${{ github.event.release.tag_name }}.apk
            artifacts/cost-of-trips-${{ github.event.release.tag_name }}.aab
