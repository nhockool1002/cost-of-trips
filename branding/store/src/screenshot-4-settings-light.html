<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --primary: #3B5CA8;
    --bg-light: #FFFBFE;
    --surface-light: #FFFFFF;
    --ink-light: #1B1B1F;
    --muted-light: #5B5766;
    --outline-light: #C9C5D0;
    --section-bg: #ECE9F3;
    --about-bg: #DCE1FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #000; }
  .phone {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-light);
    color: var(--ink-light);
  }
  .status-bar {
    height: 72px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    font-size: 30px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 16px; align-items: center; }
  .status-icons .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--ink-light); }
  .status-icons .bar { width: 44px; height: 22px; border: 3px solid var(--ink-light); border-radius: 4px; position: relative; }
  .status-icons .bar::after { content: ""; position: absolute; top: 3px; left: 3px; bottom: 3px; width: 30px; background: var(--ink-light); border-radius: 2px; }
  .top-bar {
    height: 148px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 0 24px;
  }
  .top-bar h1 { font-size: 38px; font-weight: 700; }
  .icon-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
  }
  .content { padding: 12px 32px; display: flex; flex-direction: column; gap: 22px; }
  .section {
    background: var(--section-bg);
    border-radius: 32px;
    padding: 28px 32px;
  }
  .section-title { display: flex; align-items: center; gap: 14px; font-size: 32px; font-weight: 700; margin-bottom: 12px; }
  .radio-row { display: flex; align-items: center; gap: 22px; padding: 12px 0; }
  .radio {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 4px solid var(--outline-light);
    display: flex; align-items: center; justify-content: center;
  }
  .radio.selected { border-color: var(--primary); }
  .radio.selected::after { content: ""; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); }
  .radio-label { font-size: 30px; }
  .export-btn {
    background: var(--primary);
    color: white;
    border-radius: 999px;
    padding: 26px;
    text-align: center;
    font-size: 32px;
    font-weight: 700;
  }
  .about {
    background: var(--about-bg);
    border-radius: 32px;
    padding: 36px 32px;
    text-align: center;
  }
  .about .emoji { font-size: 44px; }
  .about .name { font-size: 34px; font-weight: 800; margin-top: 6px; }
  .about .version { font-size: 24px; color: var(--muted-light); margin-top: 4px; }
  .about .tagline { font-size: 26px; margin-top: 10px; color: #2B2F3A; }
  .about .credit { font-size: 26px; font-weight: 700; margin-top: 14px; color: var(--primary); }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <div class="bar"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="top-bar">
    <div class="icon-btn">←</div>
    <h1>Cài đặt</h1>
  </div>
  <div class="content">
    <div class="section">
      <div class="section-title">🌐 Ngôn ngữ</div>
      <div class="radio-row"><div class="radio"></div><div class="radio-label">Theo hệ thống</div></div>
      <div class="radio-row"><div class="radio selected"></div><div class="radio-label">Tiếng Việt</div></div>
      <div class="radio-row"><div class="radio"></div><div class="radio-label">English</div></div>
    </div>
    <div class="section">
      <div class="section-title">🎨 Giao diện</div>
      <div class="radio-row"><div class="radio selected"></div><div class="radio-label">Theo hệ thống</div></div>
      <div class="radio-row"><div class="radio"></div><div class="radio-label">Sáng</div></div>
      <div class="radio-row"><div class="radio"></div><div class="radio-label">Tối</div></div>
    </div>
    <div class="section">
      <div class="section-title">📤 Dữ liệu</div>
      <div class="export-btn">Xuất toàn bộ dữ liệu</div>
    </div>
    <div class="about">
      <div class="emoji">🧳💰</div>
      <div class="name">Cost Of Trips</div>
      <div class="version">Phiên bản 1.0</div>
      <div class="tagline">Ghi lại chi phí của mọi chuyến đi — đơn giản và riêng tư.</div>
      <div class="credit">Thực hiện bởi NhutNguyen © 2026</div>
    </div>
  </div>
</div>
</body>
</html>
