<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --gold: #F2B705;
    --primary: #3B5CA8;
    --bg-light: #FFFBFE;
    --surface-light: #FFFFFF;
    --ink-light: #1B1B1F;
    --muted-light: #49454F;
    --outline-light: #C9C5D0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #000; }
  .phone {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-light);
    color: var(--ink-light);
  }
  .status-bar {
    height: 72px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    font-size: 30px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 16px; align-items: center; }
  .status-icons .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--ink-light); }
  .status-icons .bar { width: 44px; height: 22px; border: 3px solid var(--ink-light); border-radius: 4px; position: relative; }
  .status-icons .bar::after { content: ""; position: absolute; top: 3px; left: 3px; bottom: 3px; width: 30px; background: var(--ink-light); border-radius: 2px; }
  .top-bar {
    height: 168px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    gap: 32px;
    padding: 0 24px;
  }
  .top-bar h1 { font-size: 42px; font-weight: 600; }
  .icon-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
  }
  .section { padding: 24px 48px; }
  .section-title { font-size: 34px; font-weight: 600; margin-bottom: 24px; }
  .radio-row { display: flex; align-items: center; gap: 28px; padding: 18px 0; }
  .radio {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 4px solid var(--outline-light);
    display: flex; align-items: center; justify-content: center;
  }
  .radio.selected { border-color: var(--primary); }
  .radio.selected::after {
    content: "";
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--primary);
  }
  .radio-label { font-size: 34px; }
  .divider { height: 2px; background: var(--outline-light); margin: 16px 48px; opacity: 0.6; }
  .export-btn {
    margin: 40px 48px 0;
    background: var(--primary);
    color: white;
    border-radius: 999px;
    padding: 32px;
    text-align: center;
    font-size: 36px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <div class="bar"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="top-bar">
    <div class="icon-btn">←</div>
    <h1>Cài đặt</h1>
  </div>
  <div class="section">
    <div class="section-title">Ngôn ngữ</div>
    <div class="radio-row"><div class="radio"></div><div class="radio-label">English</div></div>
    <div class="radio-row"><div class="radio selected"></div><div class="radio-label">Tiếng Việt</div></div>
  </div>
  <div class="divider"></div>
  <div class="section">
    <div class="section-title">Giao diện</div>
    <div class="radio-row"><div class="radio selected"></div><div class="radio-label">Theo hệ thống</div></div>
    <div class="radio-row"><div class="radio"></div><div class="radio-label">Sáng</div></div>
    <div class="radio-row"><div class="radio"></div><div class="radio-label">Tối</div></div>
  </div>
  <div class="divider"></div>
  <div class="export-btn">Xuất toàn bộ dữ liệu</div>
</div>
</body>
</html>
