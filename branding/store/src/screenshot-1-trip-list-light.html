<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --primary: #3B5CA8;
    --gold: #F2B705;
    --bg-light: #FFFBFE;
    --surface-light: #FFFFFF;
    --card-light: #F1EEF7;
    --ink-light: #1B1B1F;
    --muted-light: #5B5766;
    --primary-container-light: #DCE1FF;
    --on-primary-container-light: #001947;
    --tertiary-container-light: #D3F2EC;
    --on-tertiary-container-light: #0A3830;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #000; }
  .phone {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-light);
    color: var(--ink-light);
  }
  .status-bar {
    height: 72px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    font-size: 30px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 16px; align-items: center; }
  .status-icons .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--ink-light); }
  .status-icons .bar { width: 44px; height: 22px; border: 3px solid var(--ink-light); border-radius: 4px; position: relative; }
  .status-icons .bar::after { content: ""; position: absolute; top: 3px; left: 3px; bottom: 3px; width: 30px; background: var(--ink-light); border-radius: 2px; }
  .top-bar {
    height: 148px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
  }
  .top-bar h1 { font-size: 42px; font-weight: 800; }
  .icon-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
  }
  .content { padding: 16px 32px; display: flex; flex-direction: column; gap: 26px; }
  .greeting { font-size: 44px; font-weight: 800; margin-top: 8px; }
  .hero {
    background: linear-gradient(135deg, #3B5CA8 0%, #2C6B8F 55%, #1E7A6E 100%);
    border-radius: 40px;
    padding: 40px 44px;
    color: white;
  }
  .hero .label { font-size: 28px; opacity: 0.85; font-weight: 600; }
  .hero .value { font-size: 58px; font-weight: 800; margin-top: 8px; }
  .hero .sub { font-size: 28px; opacity: 0.85; margin-top: 8px; }
  .card {
    background: var(--card-light);
    border-radius: 32px;
    padding: 28px 30px;
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .card .icon-badge {
    width: 92px; height: 92px;
    border-radius: 50%;
    background: var(--primary-container-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 46px;
    flex-shrink: 0;
  }
  .card .info { flex: 1; }
  .card .name { font-size: 36px; font-weight: 700; }
  .card .dest { font-size: 28px; color: var(--muted-light); margin-top: 4px; }
  .card .pill {
    background: var(--tertiary-container-light);
    color: var(--on-tertiary-container-light);
    border-radius: 999px;
    padding: 14px 26px;
    font-size: 28px;
    font-weight: 700;
    white-space: nowrap;
  }
  .fab {
    position: absolute;
    right: 48px;
    bottom: 90px;
    height: 132px;
    padding: 0 44px 0 38px;
    border-radius: 44px;
    background: var(--primary-container-light);
    color: var(--on-primary-container-light);
    display: flex; align-items: center; gap: 16px;
    font-size: 34px;
    font-weight: 700;
    box-shadow: 0 10px 24px rgba(0,0,0,0.2);
  }
  .fab .plus { font-size: 44px; font-weight: 400; }
  .nav-pill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-pill .bar { width: 280px; height: 10px; border-radius: 6px; background: var(--ink-light); opacity: 0.5; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <div class="bar"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="top-bar">
    <h1>Chuyến đi của tôi</h1>
    <div class="icon-btn">⚙️</div>
  </div>
  <div class="content">
    <div class="greeting">Xin chào 👋</div>
    <div class="hero">
      <div class="label">Tổng đã chi</div>
      <div class="value">15.300.000 ₫</div>
      <div class="sub">3 chuyến đi đang theo dõi</div>
    </div>
    <div class="card">
      <div class="icon-badge">✈️</div>
      <div class="info">
        <div class="name">Đà Lạt Xuân 2026</div>
        <div class="dest">📍 Đà Lạt, Lâm Đồng</div>
      </div>
      <div class="pill">4.250.000 ₫</div>
    </div>
    <div class="card">
      <div class="icon-badge">🏖️</div>
      <div class="info">
        <div class="name">Phú Quốc Hè</div>
        <div class="dest">📍 Phú Quốc, Kiên Giang</div>
      </div>
      <div class="pill">8.900.000 ₫</div>
    </div>
    <div class="card">
      <div class="icon-badge">🌆</div>
      <div class="info">
        <div class="name">Công tác Hà Nội</div>
        <div class="dest">📍 Hà Nội</div>
      </div>
      <div class="pill">2.150.000 ₫</div>
    </div>
  </div>
  <div class="fab"><span class="plus">+</span>Chuyến đi mới</div>
  <div class="nav-pill"><div class="bar"></div></div>
</div>
</body>
</html>
