<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --gold: #F2B705;
    --primary: #3B5CA8;
    --bg-light: #FFFBFE;
    --surface-light: #FFFFFF;
    --card-light: #F7F2FA;
    --ink-light: #1B1B1F;
    --muted-light: #49454F;
    --outline-light: #79747E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #000; }
  .phone {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-light);
    color: var(--ink-light);
  }
  .status-bar {
    height: 72px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    font-size: 30px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 16px; align-items: center; }
  .status-icons .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--ink-light); }
  .status-icons .bar { width: 44px; height: 22px; border: 3px solid var(--ink-light); border-radius: 4px; position: relative; }
  .status-icons .bar::after { content: ""; position: absolute; top: 3px; left: 3px; bottom: 3px; width: 30px; background: var(--ink-light); border-radius: 2px; }
  .top-bar {
    height: 168px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    gap: 32px;
    padding: 0 24px;
  }
  .top-bar h1 { font-size: 42px; font-weight: 600; }
  .icon-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
  }
  .form { padding: 40px 48px; display: flex; flex-direction: column; gap: 48px; }
  .field-label {
    font-size: 26px;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .field {
    border: 3px solid var(--outline-light);
    border-radius: 20px;
    padding: 28px 32px;
    font-size: 36px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .field.focused { border-color: var(--primary); border-width: 4px; }
  .field .arrow { color: var(--muted-light); font-size: 32px; }
  .save-btn {
    margin-top: 24px;
    background: var(--primary);
    color: white;
    border-radius: 999px;
    padding: 32px;
    text-align: center;
    font-size: 38px;
    font-weight: 600;
  }
  .nav-pill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-pill .bar { width: 280px; height: 10px; border-radius: 6px; background: var(--ink-light); opacity: 0.5; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <div class="bar"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="top-bar">
    <div class="icon-btn">←</div>
    <h1>Chi phí mới</h1>
  </div>
  <div class="form">
    <div>
      <div class="field-label">Hạng mục</div>
      <div class="field focused"><span>Ăn uống</span><span class="arrow">▾</span></div>
    </div>
    <div>
      <div class="field-label">Số tiền</div>
      <div class="field"><span>150000</span></div>
    </div>
    <div>
      <div class="field-label">Ghi chú</div>
      <div class="field"><span>Ăn trưa quán địa phương</span></div>
    </div>
    <div class="save-btn">Lưu</div>
  </div>
  <div class="nav-pill"><div class="bar"></div></div>
</div>
</body>
</html>
