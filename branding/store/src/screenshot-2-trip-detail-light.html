<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --bg-light: #FFFBFE;
    --surface-light: #FFFFFF;
    --card-light: #F1EEF7;
    --ink-light: #1B1B1F;
    --muted-light: #5B5766;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #000; }
  .phone {
    position: relative;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-light);
    color: var(--ink-light);
  }
  .status-bar {
    height: 72px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    font-size: 30px;
    font-weight: 600;
  }
  .status-icons { display: flex; gap: 16px; align-items: center; }
  .status-icons .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--ink-light); }
  .status-icons .bar { width: 44px; height: 22px; border: 3px solid var(--ink-light); border-radius: 4px; position: relative; }
  .status-icons .bar::after { content: ""; position: absolute; top: 3px; left: 3px; bottom: 3px; width: 30px; background: var(--ink-light); border-radius: 2px; }
  .top-bar {
    height: 148px;
    background: var(--surface-light);
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 0 24px;
  }
  .top-bar h1 { font-size: 38px; font-weight: 700; }
  .icon-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
  }
  .content { padding: 16px 32px; display: flex; flex-direction: column; gap: 22px; }
  .hero {
    background: linear-gradient(135deg, #3B5CA8 0%, #2C6B8F 55%, #1E7A6E 100%);
    border-radius: 40px;
    padding: 36px 44px;
    color: white;
  }
  .hero .label { font-size: 28px; opacity: 0.85; font-weight: 600; }
  .hero .value { font-size: 54px; font-weight: 800; margin-top: 8px; }
  .expense {
    background: var(--card-light);
    border-radius: 28px;
    padding: 26px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .expense .icon-badge {
    width: 84px; height: 84px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    flex-shrink: 0;
  }
  .expense .info { flex: 1; }
  .expense .cat { font-size: 32px; font-weight: 700; }
  .expense .note { font-size: 26px; color: var(--muted-light); margin-top: 2px; }
  .expense .amount { font-size: 32px; font-weight: 700; margin-right: 6px; }
  .expense .trash { opacity: 0.45; }
  .fab {
    position: absolute;
    right: 48px;
    bottom: 90px;
    height: 132px;
    padding: 0 44px 0 38px;
    border-radius: 44px;
    background: #DCE1FF;
    color: #001947;
    display: flex; align-items: center; gap: 16px;
    font-size: 34px;
    font-weight: 700;
    box-shadow: 0 10px 24px rgba(0,0,0,0.2);
  }
  .fab .plus { font-size: 44px; font-weight: 400; }
  .nav-pill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-pill .bar { width: 280px; height: 10px; border-radius: 6px; background: var(--ink-light); opacity: 0.5; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <div class="bar"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="top-bar">
    <div class="icon-btn">←</div>
    <h1>Đà Lạt Xuân 2026</h1>
  </div>
  <div class="content">
    <div class="hero">
      <div class="label">Tổng chi phí</div>
      <div class="value">4.250.000 ₫</div>
    </div>

    <div class="expense">
      <div class="icon-badge" style="background:#D6E4FF">🚗</div>
      <div class="info"><div class="cat">Di chuyển</div><div class="note">Vé xe khách</div></div>
      <div class="amount">850.000 ₫</div>
      <svg class="trash" width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M6 7h12M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="#5B5766" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="expense">
      <div class="icon-badge" style="background:#E8DAFF">🏨</div>
      <div class="info"><div class="cat">Chỗ ở</div><div class="note">Homestay 3 đêm</div></div>
      <div class="amount">1.800.000 ₫</div>
      <svg class="trash" width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M6 7h12M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="#5B5766" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="expense">
      <div class="icon-badge" style="background:#FFE0C2">🍜</div>
      <div class="info"><div class="cat">Ăn uống</div><div class="note">Ăn sáng, tối</div></div>
      <div class="amount">950.000 ₫</div>
      <svg class="trash" width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M6 7h12M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="#5B5766" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="expense">
      <div class="icon-badge" style="background:#FFD6E8">🎉</div>
      <div class="info"><div class="cat">Giải trí</div><div class="note">Vé tham quan</div></div>
      <div class="amount">400.000 ₫</div>
      <svg class="trash" width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M6 7h12M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="#5B5766" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="expense">
      <div class="icon-badge" style="background:#D1F5E0">🛍️</div>
      <div class="info"><div class="cat">Mua sắm</div><div class="note">Quà lưu niệm</div></div>
      <div class="amount">250.000 ₫</div>
      <svg class="trash" width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M6 7h12M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="#5B5766" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <div class="fab"><span class="plus">+</span>Thêm chi phí</div>
  <div class="nav-pill"><div class="bar"></div></div>
</div>
</body>
</html>
